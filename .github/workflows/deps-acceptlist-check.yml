# Builds the CfgD & CfgP targets listed in the acceptlist
# (score/config_management/deps_acceptlist.json) and fails if any previously
# known-good target no longer builds — detecting regressions in the CI setup.

name: Build Acceptlist Check

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "score/**"
      - "MODULE.bazel"
      - "score/config_management/deps_acceptlist.json"
      - ".github/workflows/deps-acceptlist-check.yml"
  push:
    branches:
      - main
    paths:
      - "score/**"
      - "MODULE.bazel"
      - "score/config_management/deps_acceptlist.json"
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-acceptlist-check:
    name: Build acceptlisted CfgD & CfgP targets
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          cache-save: ${{ github.event_name == 'push' }}

      - name: Build all acceptlisted targets
        run: |
          python3 - <<'EOF'
          import json, subprocess, sys

          ACCEPTLIST = "score/config_management/deps_acceptlist.json"

          with open(ACCEPTLIST) as f:
              targets = json.load(f)["buildable_targets"]

          failures = []
          for target in targets:
              try:
                  result = subprocess.run(
                      ["bazel", "build", target],
                      capture_output=True, text=True,
                      timeout=600,
                  )
              except subprocess.TimeoutExpired:
                  failures.append(target)
                  print(f"  TIMEOUT  {target}")
                  continue
              if result.returncode == 0:
                  print(f"  OK    {target}")
              else:
                  failures.append(target)
                  print(f"  FAIL  {target}")
                  print(result.stderr[-2000:])

          print(f"\n{len(targets) - len(failures)}/{len(targets)} targets built successfully.")

          if failures:
              print("\nRegression detected — the following targets no longer build:")
              for t in failures:
                  print(f"  {t}")
              sys.exit(1)
          EOF
